name: Alpha Desk — Autonomous Trading Agent
 
on:
  schedule:
    # Once per hour, Mon-Fri during NYSE hours (EDT = UTC-4)
    - cron: '30 13 * * 1-5'    # 09:30 ET — market open
    - cron: '30 14 * * 1-5'    # 10:30 ET
    - cron: '30 15 * * 1-5'    # 11:30 ET
    - cron: '30 16 * * 1-5'    # 12:30 ET
    - cron: '30 17 * * 1-5'    # 13:30 ET
    - cron: '30 18 * * 1-5'    # 14:30 ET
    - cron: '30 19 * * 1-5'    # 15:30 ET
    - cron: '0 20 * * 1-5'     # 16:00 ET — market close / EOD
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
 
      - name: Install dependencies
        run: pip install -r requirements.txt
 
      - name: Verify API key exists
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is EMPTY or MISSING"
            echo "Go to: Settings → Secrets and variables → Actions"
            echo "Create a Repository secret named exactly: ANTHROPIC_API_KEY"
            echo "Value: your full API key starting with sk-ant-"
            exit 1
          else
            KEY_LEN=${#ANTHROPIC_API_KEY}
            KEY_PREFIX=${ANTHROPIC_API_KEY:0:10}
            echo "✓ API key found: ${KEY_PREFIX}... (length: ${KEY_LEN})"
          fi
 
      - name: Check NYSE market hours
        id: market_check
        run: |
          python3 << 'PYTHON'
          import os
          from datetime import datetime
          import pytz
 
          et = pytz.timezone("America/New_York")
          now = datetime.now(et)
 
          holidays_2026 = {
              "2026-01-01", "2026-01-19", "2026-02-16",
              "2026-04-03", "2026-05-25", "2026-07-03",
              "2026-09-07", "2026-11-26", "2026-12-25"
          }
 
          today_str = now.strftime("%Y-%m-%d")
          is_holiday = today_str in holidays_2026
          is_weekday = now.weekday() < 5
          market_open = now.replace(hour=9, minute=30, second=0, microsecond=0)
          market_close = now.replace(hour=16, minute=15, second=0, microsecond=0)
          is_market_hours = market_open <= now <= market_close
          should_trade = is_weekday and not is_holiday and is_market_hours
 
          print(f"Time: {now.strftime('%A %Y-%m-%d %H:%M ET')}")
          print(f"Market open: {is_market_hours}, Holiday: {is_holiday}, Weekday: {is_weekday}")
          print(f"Should trade: {should_trade}")
 
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"should_trade={'true' if should_trade else 'false'}\n")
          PYTHON
 
      - name: Run trading agent
        if: steps.market_check.outputs.should_trade == 'true'
        run: python3 trading_agent.py
 
      - name: Commit updated portfolio state
        if: steps.market_check.outputs.should_trade == 'true'
        run: |
          git config user.name "Alpha Desk AI"
          git config user.email "alpha-desk@github-actions"
          git add portfolio_state.json
          git diff --staged --quiet || git commit -m "🤖 Trading cycle $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
 
      - name: Skip (market closed)
        if: steps.market_check.outputs.should_trade == 'false'
        run: echo "Market closed or holiday — skipping this cycle."
 
